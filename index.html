    <style>
        /* BASE & MODERN RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LAYOUT RESPONSIVO */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            background: white;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);

        @media (min-width: 1024px) {
            #app {
                flex-direction: row;
                height: 90vh;
                margin: auto;
                border-radius: 20px;
                overflow: hidden;
            }
            
            header {width: 350px; border-right: 1px solid #e2e8f0; height: 100%; }
            main { flex: 1; display: flex; flex-direction: column; }
            footer { position: absolute; bottom: 0; width: 330px; }
            .sidebar { display: flex; flex-direction: column; height: 100%; position: relative; }
        }

        /* HEADER & SIDEBAR */
        header { 
            background-color: #0f172a; 
            color: white; 
            padding: 10px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        
        /* FORMULARIO */
        main { flex: 1; overflow-y: auto; padding: 10px; }
        
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 600px) {
            .grid-layout { grid-template-columns: 1fr 1fr; }
        }

        /* COMPONENTES UI */
        .input-group { margin-bottom: 16px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom:2px; display: block; }
        
        input[type="text"], input[type="number"], select {
            width: 100%; 
            padding: 5px; 
            background-color: #f8fafc; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        input:focus { border-color: #f59e0b; outline: none; background: white; }
        input[readonly] { background-color: #f1f5f9; color: #94a3b8; }

        /* PREVIEW AREA */
        .preview-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px dashed #e2e8f0;
        }

        #label-container { 
            background: white; 
            border: 1px solid #000; 
            padding: 15px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
            transition: aspect-ratio 0.3s;
        }

        /* BOTONES */
        .btn-print { 
            width: 100%; 
            background-color: #f59e0b; 
            color: #0f172a; 
            padding: 2%; 
            border-radius: 12px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-size: 16px;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-print:hover { background-color: #fbbf24; }
        .btn-print:active { transform: scale(0.80); }

        /* NAVEGACIÓN TABS */
        nav { display: flex; gap: 8px; margin-bottom: 5px; background: #f1f5f9; padding: 1%px; border-radius: 12px; }
        nav button { 
            flex: 1; padding: 3%; border-radius: 8px; border: none; font-weight: 700; font-size: 12px;
            cursor: pointer; color: #64748b; background: transparent; transition: all 0.2s;
        }
        nav button.active { background: white; color: #0f172a; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }

        /* TABLAS & ZPL */
        .table-container { max-height: 400px; overflow: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; }
        
        #zpl-output { 
            background: #1e293b; color: #fbbf24; padding: 20px; border-radius: 12px; 
            font-family: 'Fira Code', monospace; font-size: 12px; overflow: auto; height: 300px;
        }

        /* ASPECT RATIOS */
        .ratio-90-60 { aspect-ratio: 90 / 60; }
        .ratio-105-85 { aspect-ratio: 105 / 85; }
        .ratio-105-25 { aspect-ratio: 105 / 25; }
        .ratio-101-13 { aspect-ratio: 101 / 13; }

        .barcode-sim { width: 100%; height: 40px; background: repeating-linear-gradient(90deg, #000, #000 2px, transparent 2px, transparent 5px); }
        .hidden { display: none !important; }
        
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 800; }
        .badge-green { background: #22c55e; color: white; }
    </style>

    <script>

let db;

async function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open("ZebraProDB", 1);
        
        request.onupgradeneeded = (e) => {
            const dbSetup = e.target.result;
            if (!dbSetup.objectStoreNames.contains("productos")) {
                dbSetup.createObjectStore("productos", { keyPath: "sku" });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };

        request.onerror = (e) => reject("Error abriendo IndexedDB");
    });
}

//////// SECUESTRO DE CTRL + P

// Listener de alta prioridad para interceptar Ctrl+P
window.addEventListener('keydown', function (e) {
    // Verificamos si es la tecla P (case insensitive) + Ctrl o Cmd (Mac)
    if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P')) {
        
        // PRIMERO: Detenemos el comportamiento del navegador inmediatamente
        e.preventDefault();
        e.stopImmediatePropagation();
        const btn = document.getElementById('print-btn');
    
        // Efecto visual de "clic"
         btn.style.transform = "scale(0.95)";
        setTimeout(() => { btn.style.transform = "scale(1)"; }, 100);

        console.log("Intercepción de Ctrl+P exitosa.");

        // SEGUNDO: Ejecutamos tu función de Zebra
        printZebra();
        
        return false; // Refuerzo para navegadores antiguos
    }
}, true); // El parámetro 'true' activa la fase de captura (prioridad máxima)

/////////////////


// NUEVO window.onload corregido
window.onload = async function() {
    // Cargar IP desde localStorage (esto sí funciona para datos pequeños)
    const savedIp = localStorage.getItem('zebra_ip');
    if (savedIp) document.getElementById('printer-ip').value = savedIp;

    try {
        await initDB(); // Esperar a que la DB abra
        const tx = db.transaction("productos", "readonly");
        const store = tx.objectStore("productos");
        const request = store.getAll();

        request.onsuccess = () => {
            productDatabase = request.result;
            if (productDatabase && productDatabase.length > 0) {
                renderDatabaseTable();
                updateDbStatus();
            }
            console.log("Base de datos cargada: ", productDatabase.length, "registros");
        };
    } catch (err) {
        console.error("Error en el inicio:", err);
    }
    updatePreview();
};

        function setTab(tab) {
            document.getElementById('view-design').classList.toggle('hidden', tab !== 'design');
            document.getElementById('view-zpl').classList.toggle('hidden', tab !== 'zpl');
            document.getElementById('view-db').classList.toggle('hidden', tab !== 'db');
            ['design', 'zpl', 'db'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                btn.className = (t === tab) ? "active" : "";
            });
            if(tab === 'zpl') updatePreview();
        }

        function updateDbStatus() {
            const status = document.getElementById('db-status');
            if (productDatabase && productDatabase.length > 0) {
                status.innerText = `${productDatabase.length} REGISTROS CARGADOS`;
                status.style.color = "#3b82f6";
            } else {
                status.innerText = "Sin base de datos";
                status.style.color = "#64748b";
            }
        }

        function renderDatabaseTable() {
            const tbody = document.getElementById('db-preview-body');
            tbody.innerHTML = '';
            if (!productDatabase || productDatabase.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px;">Sin datos cargados</td></tr>';
                return;
            }
            productDatabase.slice(0, 100).forEach((p) => {
                const tr = document.createElement('tr');
                tr.onclick = () => selectProduct(p);
                tr.innerHTML = `<td><b>${p.sku}</b></td><td>${p.articulo}</td><td style="text-align:center">${p.umedida}</td>`;
                tbody.appendChild(tr);
            });
        }

        function selectProduct(p) {
            document.getElementById('prod-sku').value = p.sku;
            document.getElementById('prod-name').value = p.articulo;
            document.getElementById('prod-um').value = p.umedida;
            updatePreview();
            setTab('design');
        }

async function clearDatabase() {
    if(confirm("¿Borrar base de datos pesada?")) {
        const db = await openDB();
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).clear();
        
        tx.oncomplete = () => {
            productDatabase = [];
            renderDatabaseTable();
            updateDbStatus();
            alert("Base de datos eliminada.");
        };
    }
}

function importCSV(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            let tempDb = [];

            lines.forEach((line) => {
                if (!line.trim()) return;
                const parts = line.split(';');
                if (parts.length >= 2) {
                    tempDb.push({ 
                        sku: parts[0].trim().toUpperCase(), 
                        articulo: parts[1].trim().toUpperCase(), 
                        umedida: (parts[2] || 'PZA').trim().toUpperCase() 
                    });
                }
            });

            if (tempDb.length > 0) {
                // GUARDAR EN INDEXEDDB
                const tx = db.transaction("productos", "readwrite");
                const store = tx.objectStore("productos");
                
                store.clear(); // Limpia lo anterior
                tempDb.forEach(item => store.put(item));

                tx.oncomplete = () => {
                    productDatabase = tempDb;
                    renderDatabaseTable();
                    updateDbStatus();
                    setTab('design');
                    alert("¡Guardado exitosamente en el navegador!");
                };
                
                tx.onerror = () => alert("Error al escribir en el disco del navegador.");
            }
        } catch (err) {
            alert("Error procesando el archivo.");
            console.error(err);
        }
    };
    reader.readAsText(file, 'windows-1252');
}

        function handleSkuSearch() {
            const inputSku = document.getElementById('prod-sku').value.trim().toUpperCase();
            const product = productDatabase.find(p => p.sku.toUpperCase() === inputSku);
            if (product) {
                document.getElementById('prod-name').value = product.articulo;
                document.getElementById('prod-um').value = product.umedida;
            }
            updatePreview();
        }

        function getZPL() {
            const name = document.getElementById('prod-name').value.toUpperCase();
            const sku = document.getElementById('prod-sku').value.toUpperCase();
            const um = document.getElementById('prod-um').value.toUpperCase();
            const qty = document.getElementById('prod-qty').value;
            const copies = document.getElementById('prod-copies').value || 1;
            const size = document.getElementById('label-size').value;
            const useEscape = document.getElementById('use-escape').checked;

            let barcodeData = sku ,extirarG = 7 ,extirarP = 6,extirar21=4,cantidad ='';
            if (useEscape) barcodeData = `${sku}_0d${qty}`,extirarG = 4,extirarP = 3,extirar21=3,cantidad = qty;

            if (size === "90x60") {
                const fontSize = name.length < 20 ? 70 : 45;
                return `^XA^PW719^LL480^CI28^LH0,0
^CF0,${fontSize},${fontSize}^FO50,50^FB620,3,10,L,0^FD${name}^FS
^CF0,40,40^FO50,230^FDCantidad: ^FS
^CF0,110,110^FO220,205^FD${qty}^FS
^CF0,35,25^FO470,205^FDUNIDAD DE MEDIDA:^FS
^CF0,70,70^FO470,240^FD${um}^FS
^BY${extirarP},2,100^FO50,330^BCN,125,N,N,N,A^FH^FD${barcodeData}^FS
^CF0,35,25^FO470,330^FDSKU:^FS
^CF0,110,75^FO470,365^FD${sku}^FS
^PQ${copies},0,1,Y^XZ`;
            }

            if (size === "105x85") {
                const fontSize = name.length < 20 ? 70 : 45;
                return `^XA^PW839^LL680^CI28^LH0,0
^CF0,${fontSize},${fontSize}^FO50,50^FB740,3,10,L,0^FD${name}^FS
^CF0,35,25^FO50,250^FDCantidad: ^FS
^CF0,200,200^FO165,250^FD${qty}^FS
^CF0,35,25^FO570,250^FDUNIDAD DE MEDIDA:^FS
^CF0,70,70^FO570,320^FD${um}^FS
^BY${extirarG},2,100^FO50,450^BCN,185,N,N,N,A^FH^FD${barcodeData}^FS
^CF0,35,25^FO570,450^FDSKU:^FS
^CF0,190,75^FO570,490^FD${sku}^FS
^PQ${copies},0,1,Y^XZ`;
            }

            if (size === "105x25") {
                const colWidth = 400; 
                const gap = 24;
                const totalEtiquetas = parseInt(copies) || 1;
                let zplCompleto = `^XA^PW840^LL200^CI28^LH0,0`;

                // Definimos la estructura de una columna individual
                const generarColumna = (offsetX) => `
            ^FO${offsetX},16^FB${colWidth-20},2,0,C,0^A0N,25,25^FD${name.substring(0,50)}^FS
            ^BY${extirar21},2,80^FO${offsetX+24},70^BCN,80,N,N,N,A^FH^FD${barcodeData}^FS
            ^FO${offsetX+50},160^FB${colWidth-20},1,0,C,0^A0N,40,40^FD${cantidad}^FS
            ^FO${offsetX+115},160^FB${colWidth-20},1,0,C,0^A0N,40,40^FD${um}^FS
            ^FO${offsetX+1},160,0^FB${colWidth-150},1,0,C,0^A0N,40,30^FD${sku}^FS`;

                // Iteramos de 2 en 2 para crear las filas necesarias
                for (let i = 0; i < totalEtiquetas; i += 2) {
                    // Añadir columna izquierda (siempre existe en este paso)
                    zplCompleto += generarColumna(0);
                    
                    // Añadir línea divisoria central
                    zplCompleto += `^FO408,0,0^GB24,200,24^FS`;

                    // Añadir columna derecha SOLO si aún queda una etiqueta por imprimir
                    if (i + 1 < totalEtiquetas) {
                        zplCompleto += generarColumna(colWidth + gap);
                    }

                    // Si no es la última fila de etiquetas, cerramos esta etiqueta y empezamos otra
                    // (Zebra interpreta cada ^XZ como el final de una etiqueta física)
                    if (i + 2 < totalEtiquetas) {
                        zplCompleto += `^XZ^XA^PW840^LL200^CI28^LH0,0`;
                    }
                }

                zplCompleto += `^PQ1,0,1,Y^XZ`; // PQ1 porque el bucle ya generó las cantidades
                return zplCompleto;
            }

            if (size === "101x13") {
                const colWidth = 250; const gap = 24;
                const zplCols = (offsetX) => `
^BY2,2,50^FO${offsetX+15},15^BCN,50,N,N,N,A^FH^FD${barcodeData}^FS
^FO${offsetX},70^FB${colWidth},1,0,C,0^A0N,18,18^FD${sku}^FS`;
                return `^XA^PW807^LL104^CI28^LH0,0
${zplCols(0)}
${zplCols(colWidth + gap)}
${zplCols((colWidth + gap) * 2)}
^PQ${copies},0,1,Y^XZ`;
            }
        }

        function exportZPL() {
            const zpl = getZPL();
            const blob = new Blob([zpl], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('prod-sku').value || 'etiqueta'}.zpl`;
            a.click();
        }

async function printZebra() {
    const method = document.getElementById('conn-method').value;
    
    if (method === 'ip') {
        await printZebraIP();
    } else if (method === 'usb') {
        await printZebraUSB();
    } else {
        await printWebSerial();
    }
}



        async function printZebraIP() {
            const ip = document.getElementById('printer-ip').value;
            const zpl = getZPL();
            const btn = document.getElementById('print-btn');
            const msg = document.getElementById('message');
            const badge = document.getElementById('status-badge');

            localStorage.setItem('zebra_ip', ip);
            btn.disabled = true;
            msg.innerText = "ENVIANDO...";
            msg.style.color = "#f59e0b";
            msg.classList.remove('hidden');
            
            try {
                await fetch(`http://${ip}/pstprnt`, { method: 'POST', body: zpl, mode: 'no-cors' });
                msg.innerText = "¡ENVIADO!";
                msg.style.color = "#22c55e";
                badge.innerText = "CONECTADO";
                badge.className = "badge badge-green";
            } catch (err) {
                msg.innerText = "ERROR DE RED";
                msg.style.color = "#ef4444";
            } finally {
                setTimeout(() => { btn.disabled = false; }, 2000);
            }
        }

async function printZebraUSB() {
    const zpl = getZPL(); // Reutiliza tu función generadora de ZPL
    const btn = document.getElementById('print-btn');
    const msg = document.getElementById('message');

    try {
        // 1. Buscamos la impresora Zebra conectada por USB
        const response = await fetch("http://localhost:9101/default");
        const device = await response.json();

        if (device && device.uid) {
            // 2. Enviamos el ZPL a la impresora encontrada
            await fetch("http://localhost:9101/write", {
                method: "POST",
                body: JSON.stringify({
                    device: { uid: device.uid },
                    data: zpl
                })
            });
            
            msg.innerText = "¡IMPRESO POR USB!";
            msg.style.color = "#22c55e";
        } else {
            throw new Error("No se detectó impresora USB");
        }
    } catch (err) {
        console.error(err);
        msg.innerText = "ERROR: ASEGÚRESE QUE BROWSER PRINT ESTÉ ABIERTO";
        msg.style.color = "#ef4444";
        msg.classList.remove('hidden');
    }
}

async function printWebSerial() {
    const zpl = getZPL();
    
    try {
        // El navegador pedirá permiso al usuario para elegir el puerto
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 }); // Ajustar según configuración de la Zebra

        const writer = port.writable.getWriter();
        const encoder = new TextEncoder();
        
        await writer.write(encoder.encode(zpl));
        
        await writer.releaseLock();
        await port.close();
        
        document.getElementById('message').innerText = "ENVIADO POR SERIAL USB";
    } catch (err) {
        alert("Error al conectar con el puerto: " + err);
    }
}
