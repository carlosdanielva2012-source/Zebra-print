<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-20">

    <div class="max-w-xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold italic text-blue-800">Mi Dashboard Finanzas</h1>
            <input type="file" id="fileInput" class="hidden" accept=".json">
            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md active:scale-95 transition-all">
                Cargar Datos
            </button>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase mb-4">Distribución de Gastos</h2>
            <div class="relative h-48">
                <canvas id="chartGastos"></canvas>
            </div>
        </div>

        <div class="flex bg-slate-200 p-1 rounded-xl mb-6 shadow-inner">
            <button onclick="cambiarVista('mes')" id="btnMes" class="flex-1 py-2 rounded-lg bg-white shadow-sm font-bold text-slate-700">Este Mes</button>
            <button onclick="cambiarVista('total')" id="btnTotal" class="flex-1 py-2 rounded-lg text-slate-500 font-bold">Histórico</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Consumo Real (Egresos)</p>
                <p id="txtConsumo" class="text-2xl font-black text-red-500">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ingresos Totales</p>
                <p id="txtIngreso" class="text-2xl font-black text-green-600">$0.00</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-slate-700">Pagos Pendientes ⏳</h2>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold">SUBTOTAL SELECCIONADO</p>
                    <p id="txtSubtotal" class="text-xl font-black text-blue-600">$0.00</p>
                </div>
            </div>
            
            <ul id="listaPendientes" class="divide-y divide-slate-100 max-h-[350px] overflow-y-auto">
                <li class="p-8 text-center text-slate-400 italic">Carga el JSON para filtrar tus deudas reales</li>
            </ul>

            <div class="p-4 bg-slate-50">
                <button onclick="compartirWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all">
                    <span>Compartir con mi Pareja</span>
                    <small>(Solo seleccionados)</small>
                </button>
            </div>
        </div>
    </div>

    <script>
        let fullData = [];
        let vistaActual = 'mes';
        let seleccionados = [];
        let miChart = null;

        const emojiMap = {
            'anda': '💧', 'caess': '⚡', 'aes': '⚡', 'tigo': '🌐', 'claro': '📱',
            'pupusas': '🫓', 'frances': '🥖', 'pan': '🥖', 'pollo': '🍗', 'campero': '🍗',
            'pizza': '🍕', 'sorbete': '🍦', 'utec': '🎓', 'gato': '🐱', 'moto': '🏍️',
            'gasolina': '⛽', 'camisa': '👕', 'ruth': '👤', 'karla': '👤'
        };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                fullData = JSON.parse(event.target.result);
                actualizarDashboard();
            };
            reader.readAsText(e.target.files[0]);
        });

        function cambiarVista(modo) {
            vistaActual = modo;
            document.getElementById('btnMes').className = modo === 'mes' ? 'flex-1 py-2 rounded-lg bg-white shadow-sm font-bold text-slate-700' : 'flex-1 py-2 rounded-lg text-slate-500 font-bold';
            document.getElementById('btnTotal').className = modo === 'total' ? 'flex-1 py-2 rounded-lg bg-white shadow-sm font-bold text-slate-700' : 'flex-1 py-2 rounded-lg text-slate-500 font-bold';
            actualizarDashboard();
        }

        function actualizarDashboard() {
            if (fullData.length === 0) return;

            const ahora = new Date();
            let filtrados = fullData;

            // 1. Filtro Temporal
            if (vistaActual === 'mes') {
                filtrados = fullData.filter(i => {
                    const d = new Date(i.date);
                    return d.getUTCMonth() === ahora.getMonth() && d.getUTCFullYear() === ahora.getFullYear();
                });
            }

            // 2. Separación de Ingresos vs Gastos
            const ingresos = filtrados.filter(i => i.amt > 0).reduce((acc, i) => acc + i.amt, 0);
            const gastos = filtrados.filter(i => i.amt < 0).reduce((acc, i) => acc + Math.abs(i.amt), 0);

            document.getElementById('txtIngreso').innerText = `$${ingresos.toFixed(2)}`;
            document.getElementById('txtConsumo').innerText = `$${gastos.toFixed(2)}`;

            // 3. Checklist: SOLO PENDIENTES (ignora los pagados)
            const pendientesReales = fullData.filter(i => i.status === 'pending' && i.amt < 0);
            renderLista(pendientesReales);

            // 4. Gráfica de Pastel (Gastos por categoría)
            generarGrafica(filtrados.filter(i => i.amt < 0));
        }

        function generarGrafica(datosGastos) {
            const resumenCat = {};
            datosGastos.forEach(i => {
                const nombreCat = i.cat.split('_')[1] || i.cat;
                resumenCat[nombreCat] = (resumenCat[nombreCat] || 0) + Math.abs(i.amt);
            });

            const ctx = document.getElementById('chartGastos').getContext('2d');
            if (miChart) miChart.destroy();

            miChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(resumenCat),
                    datasets: [{
                        data: Object.values(resumenCat),
                        backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899']
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        }

        function renderLista(items) {
            const container = document.getElementById('listaPendientes');
            container.innerHTML = '';
            
            if (items.length === 0) {
                container.innerHTML = '<li class="p-8 text-center text-slate-400 italic text-sm">¡Felicidades! No tienes deudas pendientes.</li>';
                return;
            }

            items.forEach(item => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-4 hover:bg-slate-50 transition cursor-pointer";
                li.onclick = () => toggleCheck(li, item);
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="check-circle w-6 h-6 border-2 border-slate-300 rounded-full flex items-center justify-center transition-all"></div>
                        <div>
                            <p class="font-bold text-sm text-slate-700">${item.desc}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${item.cat} | ${item.date}</p>
                        </div>
                    </div>
                    <span class="font-black text-slate-700">$${Math.abs(item.amt).toFixed(2)}</span>
                `;
                container.appendChild(li);
            });
        }

        function toggleCheck(el, item) {
            const circle = el.querySelector('.check-circle');
            const index = seleccionados.findIndex(i => i.id === item.id);
            
            if (index > -1) {
                seleccionados.splice(index, 1);
                circle.innerHTML = '';
                circle.className = "check-circle w-6 h-6 border-2 border-slate-300 rounded-full flex items-center justify-center";
                el.classList.remove('bg-blue-50');
            } else {
                seleccionados.push(item);
                circle.innerHTML = '✓';
                circle.className = "check-circle w-6 h-6 border-blue-600 bg-blue-600 text-white rounded-full flex items-center justify-center";
                el.classList.add('bg-blue-50');
            }
            
            const total = seleccionados.reduce((acc, i) => acc + Math.abs(i.amt), 0);
            document.getElementById('txtSubtotal').innerText = `$${total.toFixed(2)}`;
        }

        function compartirWhatsApp() {
            if (seleccionados.length === 0) return alert("Selecciona pagos primero");
            let mensaje = "📑 *DETALLE DE GASTOS PENDIENTES*\n━━━━━━━━━━━━━━━━━━\n\n";
            seleccionados.forEach(item => {
                let emoji = item.cat.split('_')[0] || '💸';
                const desc = item.desc.toLowerCase();
                for (let k in emojiMap) if (desc.includes(k)) { emoji = emojiMap[k]; break; }
                mensaje += `${emoji} *${item.desc.trim()}*: $${Math.abs(item.amt).toFixed(2)}\n`;
            });
            const total = seleccionados.reduce((acc, i) => acc + Math.abs(i.amt), 0);
            mensaje += `\n━━━━━━━━━━━━━━━━━━\n💰 *TOTAL A PAGAR: $${total.toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>
</body>
</html>
